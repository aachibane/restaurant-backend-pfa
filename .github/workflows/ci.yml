name: CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:

  build-and-test:
    name: Build & Run Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: pfa
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 15); do
            if mysqladmin ping -h 127.0.0.1 -u root -prootpass --silent; then
              echo "MySQL is up!"
              break
            fi
            echo "Waiting for MySQL... $i/15"
            sleep 3
          done

      - name: Build with Maven
        run: mvn clean compile --no-transfer-progress
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/pfa?useSSL=false&serverTimezone=UTC&useLegacyDatetimeCode=false&createDatabaseIfNotExist=true
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: rootpass

      - name: Run Unit Tests (exclude Selenium)
        run: mvn test --no-transfer-progress -Dexclude="com/example/pfabackend/frontend/**"
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/pfa?useSSL=false&serverTimezone=UTC&useLegacyDatetimeCode=false&createDatabaseIfNotExist=true
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: rootpass
          JWT_SECRET: ci-test-secret-key-not-used-in-production-at-all
          JWT_EXPIRATION_MS: 86400000
          SPRING_SQL_INIT_MODE: always
          SPRING_JPA_DEFER_DATASOURCE_INITIALIZATION: "true"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run Checkstyle
        run: mvn checkstyle:check --no-transfer-progress
        continue-on-error: true

  selenium-e2e:
    name: Selenium E2E Tests
    runs-on: ubuntu-latest
    needs: build-and-test

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: pfa
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: aachibane/restaurant-frontend-web-pfa
          ref: master
          path: frontend

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 15); do
            if mysqladmin ping -h 127.0.0.1 -u root -prootpass --silent; then
              echo "MySQL is up!"
              break
            fi
            echo "Waiting for MySQL... $i/15"
            sleep 3
          done

      - name: Build JAR
        run: mvn package -DskipTests --no-transfer-progress
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/pfa?useSSL=false&serverTimezone=UTC&useLegacyDatetimeCode=false&createDatabaseIfNotExist=true
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: rootpass

      - name: Start backend
        run: java -jar target/*.jar &
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/pfa?useSSL=false&serverTimezone=UTC&useLegacyDatetimeCode=false&createDatabaseIfNotExist=true
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: rootpass
          JWT_SECRET: ci-test-secret-key-not-used-in-production-at-all
          JWT_EXPIRATION_MS: 86400000
          SPRING_SQL_INIT_MODE: always
          SPRING_JPA_DEFER_DATASOURCE_INITIALIZATION: "true"

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend on port 8080..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:8080/actuator/health | grep -q "UP"; then
              echo "Backend is up!"
              break
            fi
            echo "Attempt $i/30 - waiting 5s..."
            sleep 5
          done

      - name: Seed database roles
        run: |
          echo "Seeding roles table..."
          mysql -h 127.0.0.1 -u root -prootpass pfa <<EOF
          INSERT IGNORE INTO \`roles\` (\`id\`, \`name\`) VALUES
            (1, 'ROLE_USER'),
            (2, 'ROLE_MODERATOR'),
            (3, 'ROLE_ADMIN');
          EOF
          echo "Roles seeded successfully."

      - name: Start frontend
        working-directory: frontend
        run: npm start &
        env:
          BROWSER: none
          CI: false

      - name: Wait for frontend to be ready
        run: |
          echo "Waiting for frontend on port 3000..."
          for i in $(seq 1 24); do
            if curl -s http://localhost:3000 | grep -q "html"; then
              echo "Frontend is up!"
              break
            fi
            echo "Attempt $i/24 - waiting 5s..."
            sleep 5
          done

      - name: Run Selenium E2E Tests
        run: mvn test --no-transfer-progress -Dtest="com.example.pfabackend.frontend.**"
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/pfa?useSSL=false&serverTimezone=UTC&useLegacyDatetimeCode=false&createDatabaseIfNotExist=true
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: rootpass
          JWT_SECRET: ci-test-secret-key-not-used-in-production-at-all
          JWT_EXPIRATION_MS: 86400000
          SPRING_SQL_INIT_MODE: always
          SPRING_JPA_DEFER_DATASOURCE_INITIALIZATION: "true"

      - name: Upload Selenium results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-results
          path: target/surefire-reports/